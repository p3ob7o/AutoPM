project:
  name: DemoProduct
  slug: demoproduct
  repo: git@example:demo.git
  domain: https://demo.example.com
  description: A demo product.
models:
  orchestrator: claude-sonnet-5
environments:
  definitions:
    default:
      type: cloud
      networking:
        policy: limited
        allow_mcp_servers: true
        allowed_hosts: []
  roles:
    orchestrator: default
vault:
  github: env:GITHUB_TOKEN
  linear: env:LINEAR_API_KEY
  anthropic: env:ANTHROPIC_API_KEY
mcp:
  github: { url: "https://api.githubcopilot.com/mcp/" }
webhooks:
  base_url: https://hook.demo.example.com
  routes:
    pr_opened: /wh/pr.opened
budget:
  monthly_cap_usd: 500
scheduler:
  timezone: Europe/Lisbon
